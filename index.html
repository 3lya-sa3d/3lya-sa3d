<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alya Saad</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .buttons a {
            display: inline-block;
            margin: 10px;
            padding: 10px 15px;
            font-size: 16px;
            text-decoration: none;
            color: white;
            background: #333;
            border-radius: 5px;
            transition: 0.3s;
        }
        .buttons a:hover {
            background: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="your-photo.jpg" alt="Your Photo">
        <h1>Your Name</h1>
        <p>Short bio about yourself. AI, robotics, and quantum computing enthusiast.</p>
        
        <div class="buttons">
            <a href="mailto:your-email@gmail.com">Email Me</a>
            <a href="https://github.com/your-github" target="_blank">GitHub</a>
            <a href="https://linkedin.com/in/your-profile" target="_blank">LinkedIn</a>
        </div>
    </div>

</body>
</html>
